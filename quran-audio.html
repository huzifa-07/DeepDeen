<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Quran Player</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght=400;600;700&display=swap');

        @font-face {
            font-family: 'LocalArabic';
            src: url('arabic.ttf') format('truetype');
        }

        :root {
            --ios-green: #2D6A4F; 
            --ios-bg: #f2f2f7;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.3);
            --text-main: #1d1d1f;
            --text-sec: #86868b;
        }

        * {
            box-sizing: border-box;
            font-family: 'Cairo', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background: linear-gradient(135deg, #a8e6cf 0%, #dcedc1 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .top-section {
            position: relative;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            background: transparent;
            padding-top: 70px;
            flex-shrink: 0;
        }

        .back-circle {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 40px;
            height: 40px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: var(--text-main);

            cursor: pointer;
        }

        .player-card {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            width: 90%;
            max-width: 400px;
            padding: 25px;
            
            text-align: center;
            margin-bottom: 20px;
            position: relative;
        }

        .surah-name {
            font-size: 20px;
            font-weight: 700;
            color: var(--ios-green);
            margin-bottom: 5px;
        }

        .surah-detail {
            font-size: 14px;
            color: var(--text-sec);
            margin-bottom: 15px;
        }

        .progress-container {
            width: 100%;
            height: 6px;
            background: rgba(0,0,0,0.05);
            border-radius: 10px;
            margin-bottom: 8px;
            cursor: pointer;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--ios-green);
            width: 0%;
            border-radius: 10px;
        }

        .time-labels {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: var(--text-sec);
            margin-bottom: 15px;
            padding: 0 2px;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
        }

        .btn-ctrl {
            background: none;
            border: none;
            font-size: 24px;
            color: var(--text-main);
            cursor: pointer;
            transition: transform 0.1s;
        }

        .btn-ctrl:active { transform: scale(0.9); }

        .btn-play {
            width: 55px;
            height: 55px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--ios-green);
            
        }

        .list-container {
            width: 100%;
            flex-grow: 1;
            overflow-y: auto;
            padding: 0 20px 120px;
            scrollbar-width: none;
        }
        .list-container::-webkit-scrollbar { display: none; }

        .surah-item {
            background: rgba(255, 255, 255, 0.5);
            margin-bottom: 12px;
            padding: 15px 20px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid transparent;
        }

        .surah-item:active { background: rgba(255, 255, 255, 0.8); }
        .surah-item.active {
            background: white;
            
            
        }

        .info-left { display: flex; align-items: center; gap: 15px; }
        .num-circle {
            width: 35px; height: 35px;
            background: rgba(45, 106, 79, 0.1);
            color: var(--ios-green);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 400;
            font-size: 14px;
        }

        .en-name { font-weight: 400; color: var(--text-main); line-height: 1.1; margin-bottom: 6px; }
        .ar-name { 
            font-family: 'LocalArabic', 'Cairo', serif; 
            font-size: 18px; 
            font-weight: 700; 
            color: #1b4332; 
            direction: rtl; 
        }

        .info-sub {
            font-size: 12px;
            color: var(--text-sec);
            font-weight: 400;
            margin-top: -2px;
        }

        #loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(242, 242, 247, 0.1); 
            display: flex; align-items: center; justify-content: center;
            z-index: 2000;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loader-icon {
            color: var(--ios-green);
            font-size: 24px;
            animation: spin 1s linear infinite;
        }
    </style>
</head>
<body>

<div id="loader"><i class="fa-solid fa-circle-notch loader-icon"></i></div>

<div class="top-section">
    <a href="javascript:history.back()" class="back-circle"><i class="fa-solid fa-chevron-left"></i></a>

    <div class="player-card">
        <div class="surah-name" id="currentName">Select Surah</div>
        <div class="surah-detail" id="currentDetail">Ready to play</div>
        
        <div class="progress-container" id="progressBox">
            <div class="progress-fill" id="progressBar"></div>
        </div>
        <div class="time-labels">
            <span id="timeCurrent">0:00</span>
            <span id="timeTotal">0:00</span>
        </div>

        <div class="controls">
            <button class="btn-ctrl" id="prev"><i class="fas fa-backward-step"></i></button>
            <button class="btn-ctrl btn-play" id="playBtn"><i class="fas fa-play" id="playIcon"></i></button>
            <button class="btn-ctrl" id="next"><i class="fas fa-forward-step"></i></button>
        </div>
    </div>
</div>

<div class="list-container" id="surahList"></div>

<audio id="mainAudio" preload="auto"></audio>

<script>
    const audio = document.getElementById('mainAudio');
    const surahListContainer = document.getElementById('surahList');
    const playBtn = document.getElementById('playBtn');
    const playIcon = document.getElementById('playIcon');
    const progressBar = document.getElementById('progressBar');
    const progressBox = document.getElementById('progressBox');
    const currentName = document.getElementById('currentName');
    const currentDetail = document.getElementById('currentDetail');
    const timeCurrent = document.getElementById('timeCurrent');
    const timeTotal = document.getElementById('timeTotal');

    let allSurahs = [];
    let currentIndex = -1;
    let isUserPaused = false;
    let selectedReciterValue = 'ar.alafasy';
    let isInitialLoad = true;
    let wakeLock = null;

    async function getQuran() {
        try {
            const res = await fetch('https://api.alquran.cloud/v1/surah');
            const data = await res.json();
            allSurahs = data.data;
            renderList();
            loadSavedState();
            document.getElementById('loader').style.display = 'none';
        } catch (e) {
            alert("Internet Check!");
        }
    }

    function renderList() {
        surahListContainer.innerHTML = allSurahs.map((s, i) => `
            <div class="surah-item" onclick="playSurah(${i})" id="s-${i}">
                <div class="info-left">
                    <div class="num-circle">${s.number}</div>
                    <div>
                        <div class="en-name">${s.englishName}</div>
                        <div class="info-sub">${s.numberOfAyahs} Ayahs • ${s.revelationType}</div>
                    </div>
                </div>
                <div class="ar-name">${s.name}</div>
            </div>
        `).join('');
    }

    function formatTime(secs) {
        if (isNaN(secs)) return "0:00";
        const hours = Math.floor(secs / 3600);
        const minutes = Math.floor((secs % 3600) / 60);
        const seconds = Math.floor(secs % 60);
        if (hours > 0) {
            return `${hours}:${minutes < 10 ? '0' : ''}${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
        } else {
            return `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
        }
    }

    function createNotificationArtwork(surahNameArabic) {
        const canvas = document.createElement('canvas');
        canvas.width = 512;
        canvas.height = 512;
        const ctx = canvas.getContext('2d');
        
        const gradient = ctx.createLinearGradient(0, 0, 512, 512);
        gradient.addColorStop(0, '#a8e6cf');
        gradient.addColorStop(1, '#dcedc1');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, 512, 512);
        
        ctx.fillStyle = '#1b4332';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        
        ctx.font = '700 40px LocalArabic, Cairo, serif';
        ctx.fillText(surahNameArabic, 256, 256);
        
        return canvas.toDataURL('image/png');
    }

    function updateMediaSession(surah) {
        if ('mediaSession' in navigator) {
            const artworkUrl = createNotificationArtwork(surah.name);
            navigator.mediaSession.metadata = new MediaMetadata({
                title: surah.englishName,
                artist: 'Huzaifa',
                album: '',
                artwork: [{ src: artworkUrl, sizes: '512x512', type: 'image/png' }]
            });
            navigator.mediaSession.setActionHandler('play', () => audio.play());
            navigator.mediaSession.setActionHandler('pause', () => audio.pause());
            navigator.mediaSession.setActionHandler('previoustrack', () => playSurah(currentIndex - 1));
            navigator.mediaSession.setActionHandler('nexttrack', () => playSurah(currentIndex + 1));
        }
    }

    function saveCurrentState() {
        if (currentIndex !== -1) {
            localStorage.setItem('quran_player_index', currentIndex);
            localStorage.setItem('quran_player_time', audio.currentTime);
        }
    }

    function loadSavedState() {
        const savedIndex = localStorage.getItem('quran_player_index');
        const savedTime = localStorage.getItem('quran_player_time');
        
        if (savedIndex !== null) {
            const index = parseInt(savedIndex);
            currentIndex = index;
            const surah = allSurahs[index];
            
            const activeItem = document.getElementById(`s-${index}`);
            if(activeItem) activeItem.classList.add('active');
            
            currentName.innerText = surah.englishName;
            currentDetail.innerText = `${surah.numberOfAyahs} Ayahs • ${surah.revelationType}`;
            
            isUserPaused = true;
            audio.src = `https://cdn.islamic.network/quran/audio-surah/128/${selectedReciterValue}/${surah.number}.mp3`;
            audio.load();
            
            if (savedTime !== null) {
                audio.currentTime = parseFloat(savedTime);
            }
            
            playIcon.className = "fas fa-play";
            updateMediaSession(surah);
        }
    }

    async function requestWakeLock() {
        try {
            if ('wakeLock' in navigator) {
                wakeLock = await navigator.wakeLock.request('screen');
            }
        } catch (err) {}
    }

    function releaseWakeLock() {
        if (wakeLock !== null) {
            wakeLock.release().then(() => { wakeLock = null; });
        }
    }

    function playSurah(index) {
        if(index < 0 || index >= 114) return;
        
        if(currentIndex !== -1) {
            const prev = document.getElementById(`s-${currentIndex}`);
            if(prev) prev.classList.remove('active');
        }
        
        currentIndex = index;
        const surah = allSurahs[index];
        const activeItem = document.getElementById(`s-${index}`);
        
        if(activeItem) {
            activeItem.classList.add('active');
            activeItem.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
        
        currentName.innerText = surah.englishName;
        currentDetail.innerText = `${surah.numberOfAyahs} Ayahs • ${surah.revelationType}`;
        
        isUserPaused = false;
        isInitialLoad = false;
        audio.src = `https://cdn.islamic.network/quran/audio-surah/128/${selectedReciterValue}/${surah.number}.mp3`;
        audio.load();
        audio.play();
        updateMediaSession(surah);
        saveCurrentState();
        requestWakeLock();
    }

    playBtn.onclick = () => {
        if(audio.src === "") return;
        
        if(audio.paused || playIcon.classList.contains('loader-icon')) {
            if(!audio.paused && playIcon.classList.contains('loader-icon')) {
                isUserPaused = true;
                audio.pause();
                playIcon.className = "fas fa-play";
            } else {
                isUserPaused = false;
                isInitialLoad = false;
                audio.play();
            }
        } else {
            isUserPaused = true;
            audio.pause();
            playIcon.className = "fas fa-play";
        }
        saveCurrentState();
    };

    audio.onloadstart = () => {
        if (!isUserPaused && !isInitialLoad) {
            playIcon.className = "fa-solid fa-circle-notch loader-icon";
        }
    };

    audio.onwaiting = () => {
        if (!isUserPaused && !isInitialLoad) {
            playIcon.className = "fa-solid fa-circle-notch loader-icon";
        }
    };

    audio.onplaying = () => {
        if (!isUserPaused) {
            playIcon.className = "fas fa-pause";
        }
        requestWakeLock();
    };

    audio.onplay = () => {
        if (audio.readyState < 3 && !isUserPaused && !isInitialLoad) {
            playIcon.className = "fa-solid fa-circle-notch loader-icon";
        } else if (!isUserPaused) {
            playIcon.className = "fas fa-pause";
        }
        requestWakeLock();
    };

    audio.onpause = () => { 
        playIcon.className = "fas fa-play"; 
        releaseWakeLock();
    };

    audio.ontimeupdate = () => {
        if(audio.duration) {
            const percent = (audio.currentTime / audio.duration) * 100;
            progressBar.style.width = percent + "%";
            timeCurrent.innerText = formatTime(audio.currentTime);
            timeTotal.innerText = formatTime(audio.duration);
            saveCurrentState();
        } else {
            timeCurrent.innerText = formatTime(audio.currentTime);
        }
    };

    audio.onloadedmetadata = () => {
        timeTotal.innerText = formatTime(audio.duration);
        timeCurrent.innerText = formatTime(audio.currentTime);
    };

    progressBox.onclick = (e) => {
        if(!audio.duration) return;
        const width = progressBox.clientWidth;
        const clickX = e.offsetX;
        audio.currentTime = (clickX / width) * audio.duration;
        saveCurrentState();
    };

    document.getElementById('next').onclick = () => playSurah(currentIndex + 1);
    document.getElementById('prev').onclick = () => playSurah(currentIndex - 1);
    audio.onended = () => playSurah(currentIndex + 1);

    getQuran();
</script>

</body>
</html>
