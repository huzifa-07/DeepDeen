<!DOCTYPE html>
<html lang="en" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Asma-ul-Husna</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Noto+Nastaliq+Urdu:wght@400;700&display=swap');

        @font-face {
            font-family: 'LocalArabic';
            src: url('arabic.ttf') format('truetype');
        }

        :root {
            --ios-green: #2D6A4F; 
            --ios-bg: #f2f2f7;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.3);
            --text-main: #1d1d1f;
            --text-sec: #86868b;
        }

        * {
            box-sizing: border-box;
            font-family: 'Cairo', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background: linear-gradient(135deg, #a8e6cf 0%, #dcedc1 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .top-section {
            position: relative;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            background: transparent;
            padding-top: 70px;
            flex-shrink: 0;
        }

        .back-circle {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 40px;
            height: 40px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: var(--text-main);
            
        }

        .player-card {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            width: 90%;
            max-width: 400px;
            padding: 25px;

            text-align: center;
            margin-bottom: 20px;
        }

        .surah-name {
            font-size: 20px;
            font-weight: 700;
            color: var(--ios-green);
            margin-bottom: 5px;
        }

        .surah-detail {
            font-size: 14px;
            color: var(--text-sec);
            margin-bottom: 15px;
        }

        .progress-container {
            width: 100%;
            height: 6px;
            background: rgba(0,0,0,0.05);
            border-radius: 10px;
            margin-bottom: 8px;
            cursor: pointer;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--ios-green);
            width: 0%;
            border-radius: 10px;
        }

        .time-labels {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: var(--text-sec);
            margin-bottom: 15px;
            padding: 0 2px;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
        }

        .btn-ctrl {
            background: none;
            border: none;
            font-size: 24px;
            color: var(--text-main);
            cursor: pointer;
            transition: transform 0.1s;
        }

        .btn-ctrl:active { transform: scale(0.9); }

        .btn-play {
            width: 55px;
            height: 55px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--ios-green);

        }

        .list-container {
            width: 100%;
            flex-grow: 1;
            overflow-y: auto;
            padding: 0 20px 120px;
            scrollbar-width: none;
        }
        .list-container::-webkit-scrollbar { display: none; }

        .surah-item {
            background: rgba(255, 255, 255, 0.5);
            margin-bottom: 12px;
            padding: 15px 20px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            pointer-events: none; 
            transition: 0.2s;
            border: 1px solid transparent;
        }

        .info-left { display: flex; align-items: center; gap: 15px; }
        .num-circle {
            width: 35px; height: 35px;
            background: rgba(45, 106, 79, 0.1);
            color: var(--ios-green);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
        }

        .text-group {
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: left;
        }

        .en-name { font-weight: 600; color: var(--text-main); line-height: 1.0; margin-bottom: 3px; }
        .ur-meaning { 
            font-family: 'Cairo', -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: 13px;
            color: var(--text-sec);
            line-height: 1.1;
        }

        .ar-name { 
            font-family: 'LocalArabic', 'Cairo', serif; 
            font-size: 19px; 
            font-weight: 700; 
            color: #1b4332; 
            direction: rtl; 
        }

        #loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(242, 242, 247, 0.1); 
            display: flex; align-items: center; justify-content: center;
            z-index: 2000;
        }

        .loader-icon {
            color: var(--ios-green);
            font-size: 24px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div id="loader"><i class="fa-solid fa-circle-notch loader-icon"></i></div>

<div class="top-section">
    <a href="javascript:history.back()" class="back-circle"><i class="fa-solid fa-chevron-left"></i></a>

    <div class="player-card">
        <div class="surah-name" id="currentName">Asma-ul-Husna</div>
        <div class="surah-detail" id="currentDetail">99 Names of Allah</div>
        
        <div class="progress-container" id="progressBox">
            <div class="progress-fill" id="progressBar"></div>
        </div>
        <div class="time-labels">
            <span id="timeCurrent">0:00</span>
            <span id="timeTotal">0:00</span>
        </div>

        <div class="controls">
            <button class="btn-ctrl" id="prev" style="opacity: 0.3; pointer-events: none;"><i class="fas fa-backward-step"></i></button>
            <button class="btn-ctrl btn-play" id="playBtn"><i class="fas fa-play" id="playIcon"></i></button>
            <button class="btn-ctrl" id="next" style="opacity: 0.3; pointer-events: none;"><i class="fas fa-forward-step"></i></button>
        </div>
    </div>
</div>

<div class="list-container" id="namesList"></div>

<audio id="mainAudio" preload="auto" crossorigin="anonymous"></audio>

<script>
    const audio = document.getElementById('mainAudio');
    const listContainer = document.getElementById('namesList');
    const playBtn = document.getElementById('playBtn');
    const playIcon = document.getElementById('playIcon');
    const progressBar = document.getElementById('progressBar');
    const progressBox = document.getElementById('progressBox');
    const timeCurrent = document.getElementById('timeCurrent');
    const timeTotal = document.getElementById('timeTotal');

    const AUDIO_URL = "allahname.mp3";

    function formatTime(secs) {
        if (isNaN(secs)) return "0:00";
        const hours = Math.floor(secs / 3600);
        const minutes = Math.floor((secs % 3600) / 60);
        const seconds = Math.floor(secs % 60);
        if (hours > 0) {
            return `${hours}:${minutes < 10 ? '0' : ''}${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
        } else {
            return `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
        }
    }

    function createNotificationArtwork() {
        const canvas = document.createElement('canvas');
        canvas.width = 512;
        canvas.height = 512;
        const ctx = canvas.getContext('2d');
        
        const gradient = ctx.createLinearGradient(0, 0, 512, 512);
        gradient.addColorStop(0, '#a8e6cf');
        gradient.addColorStop(1, '#dcedc1');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, 512, 512);
        
        ctx.fillStyle = '#1b4332';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        
        ctx.font = '700 40px LocalArabic, Cairo, serif';
        ctx.fillText('أسماء الله الحسنى', 256, 256);
        
        return canvas.toDataURL('image/png');
    }

    function updateMediaSession() {
        if ('mediaSession' in navigator) {
            const artworkUrl = createNotificationArtwork();
            navigator.mediaSession.metadata = new MediaMetadata({
                title: 'Asma-ul-Husna',
                artist: 'Huzaifa',
                album: '',
                artwork: [{ src: artworkUrl, sizes: '512x512', type: 'image/png' }]
            });
            navigator.mediaSession.setActionHandler('play', () => audio.play());
            navigator.mediaSession.setActionHandler('pause', () => audio.pause());
        }
    }

    async function getNames() {
        const cachedData = localStorage.getItem('allahNamesData');
        if (cachedData) {
            renderList(JSON.parse(cachedData));
            document.getElementById('loader').style.display = 'none';
        }

        try {
            const res = await fetch('https://api.aladhan.com/v1/asmaAlHusna');
            const result = await res.json();
            if(result.data) {
                localStorage.setItem('allahNamesData', JSON.stringify(result.data));
                renderList(result.data);
            }
            document.getElementById('loader').style.display = 'none';
        } catch (e) {
            document.getElementById('loader').style.display = 'none';
        }
    }

    function renderList(names) {
        listContainer.innerHTML = names.map((n) => `
            <div class="surah-item">
                <div class="info-left">
                    <div class="num-circle">${n.number}</div>
                    <div class="text-group">
                        <div class="en-name">${n.transliteration}</div>
                        <div class="ur-meaning">${n.en.meaning}</div>
                    </div>
                </div>
                <div class="ar-name">${n.name}</div>
            </div>
        `).join('');
    }

    playBtn.onclick = () => {
        if (!audio.src || audio.src === "" || !audio.src.includes(AUDIO_URL)) {
            audio.src = AUDIO_URL;
            audio.load();
        }

        if (audio.paused) {
            const playPromise = audio.play();
            if (playPromise !== undefined) {
                playPromise.then(_ => {
                    playIcon.className = "fas fa-pause";
                    updateMediaSession();
                }).catch(error => {});
            }
        } else {
            audio.pause();
            playIcon.className = "fas fa-play";
        }
    };

    audio.ontimeupdate = () => {
        if (audio.duration) {
            const percent = (audio.currentTime / audio.duration) * 100;
            progressBar.style.width = percent + "%";
            timeCurrent.innerText = formatTime(audio.currentTime);
            timeTotal.innerText = formatTime(audio.duration);
        } else {
            timeCurrent.innerText = formatTime(audio.currentTime);
        }
    };

    audio.onloadedmetadata = () => {
        timeTotal.innerText = formatTime(audio.duration);
        timeCurrent.innerText = formatTime(audio.currentTime);
    };

    progressBox.onclick = (e) => {
        if (audio.duration) {
            const width = progressBox.clientWidth;
            const clickX = e.offsetX;
            audio.currentTime = (clickX / width) * audio.duration;
        }
    };

    audio.onplay = () => { 
        playIcon.className = "fas fa-pause"; 
        updateMediaSession();
    };
    
    audio.onpause = () => { playIcon.className = "fas fa-play"; };

    getNames();
</script>

</body>
</html>
